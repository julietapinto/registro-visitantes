<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Visitantes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Registro de Visitantes</h1>

        <form id="formulario">
            <input type="text" id="nombre" placeholder="Nombre" required>

            <input type="text" id="identificacion" placeholder="Identificación" required>

            <input type="text" id="motivo" placeholder="Motivo" required>

            <button type="submit">Guardar</button>
        </form>

        <h2>Visitantes Registrados</h2>

        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Identificación</th>
                    <th>Motivo</th>
                </tr>
            </thead>

            <tbody id="tablaVisitantes"></tbody>
        </table>
    </div>

    <script src="app.js"></script>

</body>
</html>
